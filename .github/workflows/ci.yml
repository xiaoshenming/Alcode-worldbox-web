name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    name: Type Check + Build + Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          TOTAL=$(du -sb dist/assets/*.js 2>/dev/null | awk '{sum += $1} END {print sum}')
          MB=$((TOTAL / 1024 / 1024))
          echo "Bundle size: ${MB}MB (${TOTAL} bytes)"
          if [ "$TOTAL" -gt 2097152 ]; then
            echo "Bundle exceeds 2MB limit!"
            exit 1
          else
            echo "Bundle within 2MB limit"
          fi
